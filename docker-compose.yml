services:
  gpu_service:
    build:
      context: .
      dockerfile: Dockerfile
    image: hoanglam51/gpu-service:latest
    container_name: gpu_service

    environment:
      - HF_HUB_ENABLE_HF_TRANSFER=0   # tắt đi, không cần thiết
      # HF_TOKEN và các secrets khác đọc từ .env — KHÔNG hardcode ở đây

    # ── Đọc biến môi trường từ file .env ──────────────────────────────────
    env_file:
      - .env

    # ── GPU passthrough ────────────────────────────────────────────────────
    # Hoạt động trên cả hai môi trường:
    #   • Docker Desktop (Windows + WSL2): dùng GPU-PV, không cần runtime: nvidia
    #   • Linux server: cần nvidia-container-toolkit cài sẵn trên host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "5000:5000"
    # ── Volumes: checkpoint + upload tồn tại sau khi container restart ─────
    volumes:
      - checkpoint_data:/tmp/checkpoints
      - upload_data:/app/dataset_uploads

    # ── Tự khởi động lại nếu crash (trừ khi stop thủ công) ────────────────
    restart: unless-stopped

    # ── Shared memory: transformer inference cần dung lượng shm lớn ────────
    shm_size: "2gb"

    # ── Healthcheck: ping /api/system/resources mỗi 30s ───────────────────
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5000/api/system/resources" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

# ── Named volumes (dữ liệu giữ lại kể cả khi container bị xóa) ────────────
volumes:
  checkpoint_data:
  upload_data: